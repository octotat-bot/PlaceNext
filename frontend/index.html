<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-Powered Placement Cell & Internship Management System - Streamline your placement journey with intelligent resume analysis and smart eligibility matching." />
    <meta name="keywords" content="placement, internship, jobs, campus recruitment, resume analyzer, AI" />
    <meta name="author" content="Placement Portal" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="AI Placement Portal" />
    <meta property="og:description" content="Smart placement management with AI-powered resume analysis" />
    <meta property="og:type" content="website" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500&family=DM+Serif+Display:ital@0;1&display=swap" rel="stylesheet">
    
    <title>AI Placement Portal - Smart Campus Recruitment</title>

    <!-- Anti-flash theme script: applies theme before React hydrates -->
    <script>
      (function () {
        try {
          var themeVars = {
            'midnight-ink': { '--color-background-tertiary': '#f8f9fc', '--color-background-primary': '#ffffff', '--color-text-primary': '#0f172a' },
            'obsidian':     { '--color-background-tertiary': '#09090b', '--color-background-primary': '#18181b', '--color-text-primary': '#fafafa' },
            'aurora':       { '--color-background-tertiary': '#faf9f7', '--color-background-primary': '#ffffff', '--color-text-primary': '#1c1917' },
            'slate-pro':    { '--color-background-tertiary': '#e8eef4', '--color-background-primary': '#ffffff', '--color-text-primary': '#0f1729' },
            'rosewood':     { '--color-background-tertiary': '#fdf8f8', '--color-background-primary': '#ffffff', '--color-text-primary': '#1a0e0e' },
            'void':         { '--color-background-tertiary': '#000000', '--color-background-primary': '#0a0a0a', '--color-text-primary': '#f5f5f5' },
          };
          var saved = null;
          try {
            var userStr = sessionStorage.getItem('user');
            var userId = null;
            if (userStr) {
              var user = JSON.parse(userStr);
              userId = user._id || user.id;
            }
            var storageKey = userId ? 'theme_' + userId : 'theme_guest';
            saved = localStorage.getItem(storageKey);
          } catch (err) {}

          var id = (saved && themeVars[saved]) ? saved : 'midnight-ink';
          var vars = themeVars[id];
          var root = document.documentElement;
          root.setAttribute('data-theme', id);
          Object.keys(vars).forEach(function(prop) {
            root.style.setProperty(prop, vars[prop]);
          });
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
